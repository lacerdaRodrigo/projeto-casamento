name: CI

# Quality gate (§9.2): typecheck + testes + build a cada push/PR.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build
        env:
          # placeholders — o build de páginas dinâmicas não usa Supabase de verdade.
          # Os valores reais ficam nas env vars da Vercel (nunca no git).
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
